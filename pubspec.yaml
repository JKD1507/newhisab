name: newhisab
description: "A new Flutter project for MY newhisab."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Database & Path Management ---
  sqflite: ^2.3.3+3
  path: ^1.9.0
  path_provider: ^2.1.3

  # --- UI & Logic ---
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0

  # --- Admin & File Features ---
  file_picker: ^8.0.0+1     # For Restore DB function
  excel: ^4.0.6             # For Data Export function
  share_plus: ^10.0.0       # For Backup/Sharing function

  # --- QR Scanning & Payment (NEW) ---
  mobile_scanner: ^5.1.0    # For decoding QR from jkqr.jpg
  url_launcher: ^6.3.0      # To open GPay/UPI apps with scanned data
  image_picker: ^1.1.0      # (Optional) For gallery selection

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset registration
  assets:
    - assets/jkqr.jpg
